name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Echo image info
        run: |
          echo "Built image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Image URI: ghcr.io/${{ github.repository }}/surebright-agentic-ai"

      - name: Create deployment info
        run: |
          cat << EOF > deployment-info.md
          # Deployment Complete

          ## Docker Image
          - Registry: ghcr.io
          - Image: ${{ github.repository }}/surebright-agentic-AI
          - Tag: ${{ github.sha }}

          ## Full Image URI
          ghcr.io/${{ github.repository }}/surebright-agentic-ai:${{ github.sha }}

          ## Usage
          To run this image:
          ```bash
          docker run -d -p 8000:8000 \
            -e COHERE_API_KEY=your-key \
            -e LLM_PROVIDER=cohere \
            ghcr.io/${{ github.repository }}/surebright-agentic-ai:${{ github.sha }}
          ```

          ## Next Steps
          1. Pull the image: `docker pull ghcr.io/${{ github.repository }}/surebright-agentic-ai:latest`
          2. Deploy to any container hosting (Railway, Render, Fly.io, etc.)
          EOF
          cat deployment-info.md

      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: deployment-info
          path: deployment-info.md